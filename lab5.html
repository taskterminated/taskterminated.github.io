<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Lab 5 - AOL Sign Up</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>

    <script>
        function submitForm() {
            var firstname = document.getElementById("firstName").value;
            var lastname = document.getElementById("lastName").value;
            var email = document.getElementById("email").value;
            var password = document.getElementById("password").value;
            var dob = document.getElementById("dob").value;

        if (firstname == "" || lastname == "" || email == "" || password == "" || dob == "") {
            document.getElementById("result").innerHTML = "Error: Please fill every field.";
            return;
        }

        if (!password.includes("!") && !password.includes("?")) {
            document.getElementById("result").innerHTML = "Error: Password must contain special characters";
            return;
        }

        var user = {
            firstname: firstname,
            lastname: lastname,
            email: email,
            password: "*".repeat(password.length),
            dob: dob
        };

        document.getElementById("result").innerHTML =
            "Registration Successful!<br>" +
            "Name: " + user.firstname + " " + user.lastname + "<br>" +
            "Email: " + user.email + "<br>" +
            "Password: " + user.password + "<br>" +
            "Date of Birth: " + user.dob;
      }
    </script>
  </head>
  <body style="background-color: teal;">

    <div class="container mt-4">
      <img src="250.webp" alt="AOL Logo" class="img-fluid" style="max-width: 150px;">

      <h1>Sign Up for AOL - Get 99 hours free!</h1>

      <div>
        <label>First Name:</label>
        <input type="text" id="firstName"><br>

        <label>Last Name:</label>
        <input type="text" id="lastName"><br>

        <label>Email:</label>
        <input type="text" id="email"><br>

        <label>Password:</label>
        <input type="password" id="password"><br>

        <label>Date of Birth:</label>
        <input type="date" id="dob"><br>

        <button onclick="submitForm()">Register</button>
      </div>

      <br>
      <p id="result"></p>
    </div>

  </body>
</html>
