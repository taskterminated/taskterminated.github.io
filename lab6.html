<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Lab 6 - Cat Facts</title>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>

    <script>
        async function loadData() {
            const url = "https://brianobruno.github.io/cats.json";
            const options = { method: "GET" };

            const response = await fetch(url, options);
            const result = await response.text();
            const obj = JSON.parse(result);


            obj.facts.sort(function(a, b) {return a.factId - b.factId;});

            var rows = "";
            for (var i = 0; i < obj.facts.length; i++) {
              rows += "<tr><td>" + obj.facts[i].factId + "</td><td>" + obj.facts[i].text + "</td></tr>";    
            }
            document.getElementById("table").innerHTML = rows;

            document.getElementById("cat").src = obj.catPhoto;
      }
    </script>
</head>
    <body>

        <div class="container mt-4">
            <h1>Cat Facts</h1>

        <img id="cat" src="catcage.jpg" alt="A cat" class="img-fluid" style="max-width: 300px;"><br><br><br>

        <button onclick="loadData()">Get Cat Facts</button><br><br><br>

        <table class="table table-bordered">
            <thead>
                <tr>
                    <th>factId</th>
                    <th>fact</th>
                </tr>
            </thead>
            <tbody id="table">
            </tbody>
        </table>

        </div>

    </body>
</html>
